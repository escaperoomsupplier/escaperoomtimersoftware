<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escape Room Control</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=SF+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Titlebar -->
  <header class="titlebar">
    <div class="titlebar-left">
      <div class="traffic-lights">
        <span class="dot dot-red"></span>
        <span class="dot dot-yellow"></span>
        <span class="dot dot-green"></span>
      </div>
      <h1 class="app-title">Escape Room Control</h1>
    </div>
    <div class="titlebar-center">
      <div class="status-pills">
        <div class="pill" id="statusIndicator">
          <span class="pill-dot standby"></span>
          <span class="pill-label">Standby</span>
        </div>
        <div class="pill" id="timerDisplayStatus">
          <span class="pill-dot offline"></span>
          <span class="pill-label">Display Offline</span>
        </div>
      </div>
    </div>
    <div class="titlebar-right">
      <span class="clock" id="clockDisplay">00:00</span>
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- Main Layout -->
  <div class="app-layout">

    <!-- Sidebar Navigation -->
    <nav class="sidebar">
      <div class="nav-group">
        <button class="nav-item active" data-view="rooms">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
          <span>Rooms</span>
        </button>
        <button class="nav-item" data-view="control">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <span>Control</span>
        </button>
        <button class="nav-item" data-view="setup">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          <span>Setup</span>
        </button>
      </div>
      <div class="nav-group nav-bottom">
        <button class="nav-item accent" id="btnOpenTimer">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          <span>Open Display</span>
        </button>
      </div>
    </nav>

    <!-- Content Area -->
    <main class="content">

      <!-- ROOMS VIEW -->
      <section class="view active" id="view-rooms">
        <div class="view-header">
          <div>
            <h2>Rooms</h2>
            <p class="subtitle">Select a room to start a session</p>
          </div>
          <button class="btn btn-primary" id="btnNewRoom">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            New Room
          </button>
        </div>
        <div class="rooms-grid" id="roomsGrid"></div>
      </section>

      <!-- ROOM SETUP VIEW -->
      <section class="view" id="view-setup">
        <div class="view-header">
          <div>
            <h2>Room Setup</h2>
            <p class="subtitle">Configure room parameters</p>
          </div>
        </div>
        <div class="card setup-card">
          <div class="form-group">
            <label for="setupName">Room Name</label>
            <input type="text" id="setupName" placeholder="e.g. The Vault, Prison Break...">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="setupDuration">Duration (minutes)</label>
              <input type="number" id="setupDuration" value="60" min="1" max="999">
            </div>
            <div class="form-group">
              <label for="setupMaxHints">Max Hints</label>
              <input type="number" id="setupMaxHints" value="5" min="0" max="99">
            </div>
            <div class="form-group">
              <label for="setupCountdownType">Countdown Style</label>
              <select id="setupCountdownType">
                <option value="S0">Standard (MM:SS)</option>
                <option value="S1">Total Seconds</option>
                <option value="S2">Percentage (decreasing)</option>
                <option value="S3">Percentage (increasing)</option>
                <option value="S4">Count Up</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="setupDescription">Description</label>
            <textarea id="setupDescription" rows="2" placeholder="Brief room description..."></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="setupSuccessMsg">Success Message</label>
              <input type="text" id="setupSuccessMsg" value="Congratulations! You escaped!">
            </div>
            <div class="form-group">
              <label for="setupFailMsg">Fail Message</label>
              <input type="text" id="setupFailMsg" value="Time is up! You are trapped!">
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-secondary" id="btnCancelSetup">Cancel</button>
            <button class="btn btn-primary" id="btnSaveRoom">Save Room</button>
          </div>
        </div>
      </section>

      <!-- CONTROL VIEW -->
      <section class="view" id="view-control">
        <div class="view-header">
          <div>
            <h2 id="controlRoomName">No Room Selected</h2>
            <p class="subtitle">Game Control Panel</p>
          </div>
        </div>

        <!-- Timer Card -->
        <div class="card timer-card">
          <div class="timer-display" id="timerDisplay">60:00</div>
          <div class="timer-controls">
            <button class="btn btn-success btn-lg" id="btnStart">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Start
            </button>
            <button class="btn btn-warning btn-lg" id="btnPause" disabled>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
              Pause
            </button>
            <button class="btn btn-ghost btn-lg" id="btnReset">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
              Reset
            </button>
          </div>
          <div class="time-adjust">
            <button class="btn-pill" data-time="-300">-5m</button>
            <button class="btn-pill" data-time="-60">-1m</button>
            <button class="btn-pill" data-time="60">+1m</button>
            <button class="btn-pill" data-time="300">+5m</button>
          </div>
        </div>

        <!-- Bottom Grid -->
        <div class="control-grid">
          <!-- Hints -->
          <div class="card">
            <div class="card-header">
              <h3>Hints</h3>
              <span class="badge" id="hintsRemaining">0</span>
            </div>
            <div class="hints-list" id="hintsList"></div>
            <div class="hint-compose">
              <input type="text" id="customHintText" placeholder="Type a custom hint...">
              <button class="btn btn-primary btn-sm" id="btnSendCustomHint">Send</button>
            </div>
            <button class="btn btn-ghost btn-sm btn-block" id="btnClearHint">Clear Display</button>
          </div>

          <!-- Game Actions -->
          <div class="card">
            <div class="card-header">
              <h3>Game Actions</h3>
            </div>
            <div class="actions-stack">
              <button class="btn btn-success btn-block" id="btnEndSuccess">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                End — Success
              </button>
              <button class="btn btn-danger btn-block" id="btnEndFail">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>
                End — Fail
              </button>
            </div>
            <div class="card-header" style="margin-top:16px">
              <h3>Quick Actions</h3>
            </div>
            <div id="quickActionsPanel" class="quick-actions"></div>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
